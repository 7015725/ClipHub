name: Finalize formal release source

on:
  push:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/workflows/finalize-release-source.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0

      - name: Switch formal source to main
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          entry_path = Path('ClipHub.js')
          manifest_path = Path('module-manifest.json')

          entry = entry_path.read_text(encoding='utf-8')
          old_entry = 'var DEFAULT_REF = "agent/initialize-project-skeleton";'
          new_entry = 'var DEFAULT_REF = "main";'
          if entry.count(old_entry) != 1:
              raise SystemExit('unexpected ClipHub.js DEFAULT_REF marker')
          entry_path.write_text(entry.replace(old_entry, new_entry, 1), encoding='utf-8')

          manifest = manifest_path.read_text(encoding='utf-8')
          old_manifest = '"sourceRef": "agent/initialize-project-skeleton"'
          new_manifest = '"sourceRef": "main"'
          if manifest.count(old_manifest) != 1:
              raise SystemExit('unexpected module-manifest sourceRef marker')
          manifest_path.write_text(
              manifest.replace(old_manifest, new_manifest, 1),
              encoding='utf-8',
          )
          PY
          rm -f .github/workflows/finalize-release-source.yml

      - name: Validate release source patch
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_es5.py .
          python scripts/audit_color_api.py --release-strict
          git diff --check
          grep -F 'var DEFAULT_REF = "main";' ClipHub.js
          grep -F '"sourceRef": "main"' module-manifest.json
          test ! -e .github/workflows/finalize-release-source.yml

      - name: Commit finalized release source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ClipHub.js module-manifest.json .github/workflows/finalize-release-source.yml
          git commit -m 'release: switch formal module source to main'
          bash scripts/release_preflight.sh --main
          git push origin HEAD:agent/initialize-project-skeleton
