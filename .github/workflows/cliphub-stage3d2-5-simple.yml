name: Apply ClipHub stage 3D2-5 simple

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-5-simple-trigger.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0

      - name: Run stage 3D2-5
        shell: bash
        run: bash .github/cliphub-stage3d2-5/run.sh
