name: Apply ClipHub stage 3D2-5 simple

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-5-simple-trigger.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0

      - name: Run stage 3D2-5
        shell: bash
        run: |
          set +e
          bash .github/cliphub-stage3d2-5/run.sh > /tmp/stage3d25_simple.log 2>&1
          code=$?
          cat /tmp/stage3d25_simple.log
          exit "$code"

      - name: Report failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(printf 'Stage 3D2-5 simple failed:\n\n```text\n%s\n```' "$(tail -n 120 /tmp/stage3d25_simple.log)")"
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --method POST --raw-field body="$body"
