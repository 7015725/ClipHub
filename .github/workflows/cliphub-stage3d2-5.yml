name: Apply ClipHub stage 3D2-5

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-5-trigger.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: cliphub-stage3d2-5
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == '7015725/ClipHub'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0

      - name: Apply stage 3D2-5
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/cliphub-stage3d2-5/apply.py')
          text = path.read_text(encoding='utf-8')
          old = """text = replace_once(text,
'''            ClipHub.Repository.reorderTags(ids);
            uiState.tagReorderCount += 1;
            emitTagsChanged(\"tag_reordered\", tagId);
            buildPage();
            return true;
''',
'''            ClipHub.Repository.reorderTags(ids);
            uiState.tagReorderCount += 1;
            emitTagsChanged(\"tag_reordered\", tagId);
            rebuildTagPage();
            return true;
''', 'settings reorder rebuild')"""
          new = """old_reorder = '''            ClipHub.Repository.reorderTags(ids);
            uiState.tagReorderCount += 1;
            emitTagsChanged(\"tag_reordered\", tagId);
            buildPage();
            return true;
'''
new_reorder = '''            ClipHub.Repository.reorderTags(ids);
            uiState.tagReorderCount += 1;
            emitTagsChanged(\"tag_reordered\", tagId);
            rebuildTagPage();
            return true;
'''
if old_reorder in text:
    text = text.replace(old_reorder, new_reorder, 1)
elif new_reorder not in text:
    raise SystemExit('settings reorder rebuild marker missing')"""
          if text.count(old) != 1:
              raise SystemExit('runtime compatibility patch marker mismatch')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 .github/cliphub-stage3d2-5/apply.py > /tmp/cliphub_stage3d25.log 2>&1
          code=$?
          cat /tmp/cliphub_stage3d25.log
          exit "$code"

      - name: Report patch failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(printf 'Stage 3D2-5 patch failed:\n\n```text\n%s\n```' "$(tail -n 120 /tmp/cliphub_stage3d25.log)")"
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --method POST --raw-field body="$body"

      - name: Validate stage 3D2-5
        if: success()
        shell: bash
        run: |
          set +e
          {
            for file in \
              src/ch_10_editor.js \
              src/ch_11_filter.js \
              src/ch_13_settings.js; do
              node --check "$file" || exit $?
            done
            python3 - <<'PY'
          from pathlib import Path
          import re
          files = [
              'src/ch_10_editor.js',
              'src/ch_11_filter.js',
              'src/ch_13_settings.js'
          ]
          for name in files:
              text = Path(name).read_text(encoding='utf-8')
              forbidden = []
              if re.search(r'(?m)^\s*(?:let|const)\s+', text):
                  forbidden.append('let/const')
              if '=>' in text:
                  forbidden.append('arrow')
              if '`' in text:
                  forbidden.append('template literal')
              if re.search(r'\bclass\s+[A-Za-z_$]', text):
                  forbidden.append('class')
              if forbidden:
                  raise SystemExit(name + ': forbidden ES6: ' + ', '.join(forbidden))
          checks = {
              'src/ch_10_editor.js': [
                  'MODULE_VERSION: 10', 'reference_tag_selector_v1',
                  'performTagSelectionSaveClick',
                  'ClipHub.Repository.setItemTags(id, editorDraftTagIds)'
              ],
              'src/ch_11_filter.js': [
                  'MODULE_VERSION: 14', 'reference_search_v7',
                  'tagColorPreviewCount'
              ],
              'src/ch_13_settings.js': [
                  'MODULE_VERSION: 6', 'reference_settings_v2',
                  'dragReorderEnabled: true',
                  'deleteRequiresConfirmation: true'
              ]
          }
          for name, markers in checks.items():
              text = Path(name).read_text(encoding='utf-8')
              for marker in markers:
                  if marker not in text:
                      raise SystemExit(name + ': missing marker ' + marker)
          PY
            git diff --check
          } > /tmp/cliphub_stage3d25_validate.log 2>&1
          code=$?
          cat /tmp/cliphub_stage3d25_validate.log
          exit "$code"

      - name: Report validation failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/cliphub_stage3d25_validate.log ]; then
            body="$(printf 'Stage 3D2-5 validation failed:\n\n```text\n%s\n```' "$(tail -n 120 /tmp/cliphub_stage3d25_validate.log)")"
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              --method POST --raw-field body="$body"
          fi

      - name: Publish stage 3D2-5
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ClipHub Automation"
          git config user.email "actions@github.com"
          git add \
            src/ch_10_editor.js \
            src/ch_11_filter.js \
            src/ch_13_settings.js \
            module-manifest.json \
            docs/阶段3D2-5标签管理与选择器实施说明.md
          git commit -m "feat: add transactional tag selector and visual tag manager"
          git push origin HEAD:agent/initialize-project-skeleton
