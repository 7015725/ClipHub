name: apply-window-geometry-refactor

on:
  push:
    branches:
      - agent/unify-window-geometry
    paths:
      - scripts/apply_window_geometry_refactor.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-window-geometry
          fetch-depth: 0

      - name: Apply refactor
        run: python3 scripts/apply_window_geometry_refactor.py

      - name: Validate Rhino ES5
        run: python3 scripts/validate_es5.py .

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in src/*.js; do
            node --check "$file"
          done

      - name: Validate refactor contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'geometryService: true' src/ch_08_window.js
          grep -q 'legacyHomeRemoved: true' src/ch_08_window.js
          grep -q 'resizeCorner: "bottom_right"' src/ch_08_window.js
          grep -q 'installPrimaryWindow' src/ch_11_filter.js
          ! grep -q 'drawerHeightDp = 540' src/ch_11_filter.js
          ! grep -q 'screenHeightDp - 170' src/ch_11_filter.js
          ! grep -q 'ClipHub.Window.open' src/ch_09_list.js
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          manifest = json.loads(Path('module-manifest.json').read_text(encoding='utf-8'))
          assert manifest['moduleSetVersion'] == '20260723.15'
          assert manifest['sourceRef'] == 'agent/unify-window-geometry'
          for item in manifest['modules']:
              path = Path(item['path'])
              digest = hashlib.sha1(('blob %d\0' % path.stat().st_size).encode() + path.read_bytes()).hexdigest()
              assert item['sha'] == digest, (item['path'], item['sha'], digest)
          PY

      - name: Remove one-shot tooling
        run: |
          rm -f scripts/apply_window_geometry_refactor.py
          rm -f scripts/apply_window_geometry_refactor_impl.py
          rm -f scripts/window_geometry_payload_*.txt
          rm -f .github/workflows/apply-window-geometry-refactor.yml

      - name: Commit refactor
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: unify floating window geometry"
          git push origin HEAD:agent/unify-window-geometry
