name: apply-window-toolbar-reserve

on:
  push:
    branches:
      - agent/unify-window-geometry
    paths:
      - scripts/apply_window_toolbar_reserve.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-window-geometry
          fetch-depth: 0

      - name: Apply toolbar reserve
        run: python3 scripts/apply_window_toolbar_reserve.py

      - name: Validate Rhino ES5
        run: python3 scripts/validate_es5.py .

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in src/*.js; do
            node --check "$file"
          done

      - name: Validate boundary contract
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'params.rightMargin = rootMode ? dp(40) : 0;' src/ch_11_filter.js
          grep -q 'MODULE_VERSION: 17' src/ch_11_filter.js
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          manifest = json.loads(Path('module-manifest.json').read_text(encoding='utf-8'))
          item = next(x for x in manifest['modules'] if x['name'] == 'ch_11_filter.js')
          path = Path(item['path'])
          data = path.read_bytes()
          digest = hashlib.sha1(b'blob ' + str(len(data)).encode('ascii') + b'\0' + data).hexdigest()
          assert item['sha'] == digest, (item['sha'], digest)
          PY

      - name: Remove one-shot tooling
        run: |
          rm -f scripts/apply_window_toolbar_reserve.py
          rm -f .github/workflows/apply-window-toolbar-reserve.yml

      - name: Commit boundary fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reserve toolbar space for resize handle"
          git push origin HEAD:agent/unify-window-geometry
