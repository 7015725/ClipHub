name: Apply ClipHub stage 3D2-4

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-4-trigger.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: cliphub-stage3d2-4
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == '7015725/ClipHub'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0
      - name: Apply stage 3D2-4
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/cliphub-stage3d2-4/patch.py')
          text = path.read_text(encoding='utf-8')
          old = '                eventAt, metadata);'
          new = '                eventAt,\n                read\n            );'
          if text.count(old) != 2:
              raise SystemExit('clipboard patch compatibility marker mismatch')
          text = text.replace(old, new)
          old_version = "s = replace_once(s, '        MODULE_VERSION: 2,', '        MODULE_VERSION: 3,',\n                 'clipboard version')"
          new_version = "if '        MODULE_VERSION: 2,' in s:\n    s = s.replace('        MODULE_VERSION: 2,', '        MODULE_VERSION: 3,', 1)\nelif '        MODULE_VERSION: 3,' not in s:\n    raise SystemExit('clipboard version marker missing')"
          if text.count(old_version) != 1:
              raise SystemExit('clipboard version patch marker mismatch')
          text = text.replace(old_version, new_version, 1)
          path.write_text(text, encoding='utf-8')
          PY
          set +e
          bash -x .github/cliphub-stage3d2-4/apply.sh > /tmp/cliphub_stage4.log 2>&1
          code=$?
          tail -n 200 /tmp/cliphub_stage4.log
          if [ "$code" -ne 0 ]; then
            tail -n 80 /tmp/cliphub_stage4.log > .github/cliphub-stage3d2-4-failure.log
            git config user.name "ClipHub Automation"
            git config user.email "actions@github.com"
            git add -f .github/cliphub-stage3d2-4-failure.log
            git commit -m "chore: record stage 3D2-4 failure" || true
            git push origin HEAD:agent/initialize-project-skeleton || true
          fi
          exit "$code"
