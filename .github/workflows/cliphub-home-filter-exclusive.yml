name: Apply ClipHub home filter exclusive-window fix

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-home-filter-exclusive-trigger.txt

permissions:
  contents: write

concurrency:
  group: cliphub-home-filter-exclusive
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == '7015725/ClipHub'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0
      - name: Apply exclusive-window fix
        shell: bash
        run: |
          set +e
          bash -x .github/cliphub-home-filter-exclusive/apply.sh > /tmp/cliphub_apply.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            tail -n 180 /tmp/cliphub_apply.log > .github/cliphub-home-filter-exclusive/failure.log
            git config user.name "ClipHub Automation"
            git config user.email "actions@github.com"
            git add .github/cliphub-home-filter-exclusive/failure.log
            git commit -m "chore: record home filter workflow failure" || true
            git push origin HEAD:agent/initialize-project-skeleton
          fi
          exit "$code"
