name: Apply ClipHub home filter exclusive-window fix

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-home-filter-exclusive-trigger.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: cliphub-home-filter-exclusive
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == '7015725/ClipHub'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0
      - name: Apply exclusive-window fix
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          bash -x .github/cliphub-home-filter-exclusive/apply.sh > /tmp/cliphub_apply.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            {
              echo '```text'
              tail -n 140 /tmp/cliphub_apply.log
              echo '```'
            } > /tmp/cliphub_comment.md
            gh api repos/${{ github.repository }}/issues/10/comments --method POST --field body=@/tmp/cliphub_comment.md || true
          fi
          exit "$code"
