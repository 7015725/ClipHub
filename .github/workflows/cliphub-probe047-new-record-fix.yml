name: Fix ClipHub probe 047 new record

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-probe047-new-record-fix-trigger.txt

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0
      - name: Patch and publish probe 047
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('probes/cliphub_tag_management_probe_047_impl.js')
          text = path.read_text(encoding='utf-8')
          old = '''            result.newEditorOpen = global.ClipHub.Editor.openNew({
                text: "ClipHub 新记录标签保存测试",
                requestKeyboard: false
            });
            waitFor(function () {
                return global.ClipHub.Editor.getState().mode === "new";
            }, 1000);
            global.ClipHub.Editor.performOpenTagSelectorClick();
'''
          new = '''            result.newEditorOpen = global.ClipHub.Editor.openNew({
                requestKeyboard: false
            });
            waitFor(function () {
                return global.ClipHub.Editor.getState().mode === "new";
            }, 1000);
            result.newEditorTextSet = global.ClipHub.Editor.setInputText(
                "ClipHub 新记录标签保存测试");
            global.ClipHub.Editor.performOpenTagSelectorClick();
'''
          if text.count(old) != 1:
              raise SystemExit('new record setup marker mismatch')
          text = text.replace(old, new, 1)
          old_ok = '''                result.newEditorSave === true &&
                result.newItemId > 0 &&
'''
          new_ok = '''                result.newEditorTextSet === true &&
                result.newEditorSave === true &&
                result.newItemId > 0 &&
'''
          if text.count(old_ok) != 1:
              raise SystemExit('new record success marker mismatch')
          path.write_text(text.replace(old_ok, new_ok, 1), encoding='utf-8')
          PY

          node --check probes/cliphub_tag_management_probe_047_impl.js
          git diff --check
          git config user.name "ClipHub Automation"
          git config user.email "actions@github.com"
          git add probes/cliphub_tag_management_probe_047_impl.js
          git commit -m "test: set probe 047 new-record text explicitly"
          implementation_commit="$(git rev-parse HEAD)"

          python3 - "$implementation_commit" <<'PY'
          from pathlib import Path
          import sys
          commit = sys.argv[1]
          loader = Path('probes/cliphub_tag_management_probe_047.js')
          text = loader.read_text(encoding='utf-8')
          old = 'var implementationCommit = "75bd23e631cf06d1c1bb3adb5b12091e8d8d03b6";'
          new = 'var implementationCommit = "' + commit + '";'
          if text.count(old) != 1:
              raise SystemExit('loader commit marker mismatch')
          loader.write_text(text.replace(old, new, 1), encoding='utf-8')

          doc = Path('docs/标签管理与选择器探测047说明.md')
          text = doc.read_text(encoding='utf-8')
          old = '75bd23e631cf06d1c1bb3adb5b12091e8d8d03b6'
          if text.count(old) != 1:
              raise SystemExit('doc commit marker mismatch')
          doc.write_text(text.replace(old, commit, 1), encoding='utf-8')
          PY

          node --check probes/cliphub_tag_management_probe_047.js
          git diff --check
          git add probes/cliphub_tag_management_probe_047.js \
            docs/标签管理与选择器探测047说明.md
          git commit -m "test: repin probe 047 implementation"
          git push origin HEAD:agent/initialize-project-skeleton
