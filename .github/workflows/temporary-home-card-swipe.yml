name: temporary-home-card-swipe

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'agent/unify-window-geometry'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-window-geometry
          fetch-depth: 0

      - name: Repair patch matcher
        run: python3 scripts/fix_patch_home_card_swipe.py

      - name: Apply home card swipe patch
        run: python3 scripts/patch_home_card_swipe.py

      - name: Validate Rhino ES5
        run: python3 scripts/validate_es5.py .

      - name: Validate JavaScript syntax
        run: node --check src/ch_11_filter.js

      - name: Validate manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          manifest = json.loads(Path('module-manifest.json').read_text(encoding='utf-8'))
          assert manifest['moduleSetVersion'] == '20260724.10'
          assert manifest['sourceRef'] == 'agent/unify-window-geometry'
          for item in manifest['modules']:
              path = Path(item['path'])
              data = path.read_bytes()
              digest = hashlib.sha1(b'blob ' + str(len(data)).encode('ascii') + b'\0' + data).hexdigest()
              assert item['sha'] == digest, (item['path'], item['sha'], digest)
          PY

      - name: Validate swipe contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'MODULE_VERSION: 20' src/ch_11_filter.js
          grep -q 'var MotionEvent = Packages.android.view.MotionEvent;' src/ch_11_filter.js
          grep -q 'var ViewConfiguration = Packages.android.view.ViewConfiguration;' src/ch_11_filter.js
          grep -q 'function swipeInteractionBlocked()' src/ch_11_filter.js
          grep -q 'function bindSwipeGesture(row, wrapper, foreground' src/ch_11_filter.js
          grep -q 'absX > touchSlop && absX > absY \* 1.2' src/ch_11_filter.js
          grep -q 'absY > touchSlop && absY >= absX' src/ch_11_filter.js
          grep -q 'Number(target.getWidth()) - dp(58)' src/ch_11_filter.js
          grep -q 'if (direction < 0)' src/ch_11_filter.js
          grep -q 'changed = toggleResultPinned(row);' src/ch_11_filter.js
          grep -q 'changed = deleteResultRow(row, "swipe_delete");' src/ch_11_filter.js
          grep -q '左滑置顶，右滑删除' src/ch_11_filter.js
          grep -q 'swipePinCount:' src/ch_11_filter.js
          grep -q 'swipeDeleteCount:' src/ch_11_filter.js
          grep -q 'wrapper.addView(actionLayer' src/ch_11_filter.js
          grep -q 'wrapper.addView(card' src/ch_11_filter.js
          grep -q 'cancelActiveSwipe(false);' src/ch_11_filter.js

      - name: Remove temporary tooling
        run: |
          rm -f scripts/fix_patch_home_card_swipe.py
          rm -f scripts/patch_home_card_swipe.py
          rm -f .github/workflows/temporary-home-card-swipe.yml

      - name: Commit validated feature
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add swipe actions to home cards"
          git push origin HEAD:agent/unify-window-geometry
