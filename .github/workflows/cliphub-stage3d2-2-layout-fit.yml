name: Apply ClipHub advanced filter layout fit

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-2-layout-fit-trigger.txt

permissions:
  contents: write

concurrency:
  group: cliphub-stage3d2-2-layout-fit
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == '7015725/ClipHub'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0
      - name: Apply layout fit
        shell: bash
        run: bash .github/cliphub-stage3d2-2-layout-fit/apply.sh
