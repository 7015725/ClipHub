name: temporary-window-frame-coalescing

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'agent/unify-window-geometry'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-window-geometry
          fetch-depth: 0

      - name: Apply frame coalescing patch
        run: python3 scripts/patch_window_frame_coalescing.py

      - name: Validate Rhino ES5
        run: python3 scripts/validate_es5.py .

      - name: Validate JavaScript syntax
        run: node --check src/ch_08_window.js

      - name: Validate manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          manifest = json.loads(Path('module-manifest.json').read_text(encoding='utf-8'))
          assert manifest['moduleSetVersion'] == '20260724.08'
          item = next(x for x in manifest['modules'] if x['name'] == 'ch_08_window.js')
          path = Path(item['path'])
          data = path.read_bytes()
          digest = hashlib.sha1(b'blob ' + str(len(data)).encode('ascii') + b'\0' + data).hexdigest()
          assert item['sha'] == digest, (item['sha'], digest)
          PY

      - name: Validate performance contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'MODULE_VERSION: 14' src/ch_08_window.js
          grep -q 'frameCoalescingEnabled: true' src/ch_08_window.js
          grep -q 'function requestFrameUpdate(' src/ch_08_window.js
          grep -q 'function flushFrameUpdate()' src/ch_08_window.js
          grep -q 'postOnAnimation(frameUpdate.runnable)' src/ch_08_window.js
          grep -q 'gestureBoundsSnapshot()' src/ch_08_window.js
          grep -q 'state.frameUpdateCoalescedCount += 1;' src/ch_08_window.js
          grep -q 'state.frameUpdateSkippedCount += 1;' src/ch_08_window.js
          test "$(grep -c 'if (completed) { flushFrameUpdate(); }' src/ch_08_window.js)" -eq 2
          test "$(grep -c 'requestFrameUpdate(binding' src/ch_08_window.js)" -eq 2
          ! grep -q 'updateSharedLayout(binding, drag.startX + deltaX' src/ch_08_window.js
          ! grep -q 'updateSharedLayout(binding, Number(binding.layoutParams.x)' src/ch_08_window.js

      - name: Remove temporary tooling
        run: |
          rm -f scripts/patch_window_frame_coalescing.py
          rm -f .github/workflows/temporary-window-frame-coalescing.yml

      - name: Commit validated optimization
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: coalesce window resize updates per frame"
          git push origin HEAD:agent/unify-window-geometry
