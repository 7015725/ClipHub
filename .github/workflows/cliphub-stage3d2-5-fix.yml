name: Apply ClipHub stage 3D2-5 fix

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-5-fix-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0
      - name: Run settings positioning fix
        shell: bash
        run: bash .github/cliphub-stage3d2-5-fix/run.sh
