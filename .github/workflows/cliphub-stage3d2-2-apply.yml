name: Apply ClipHub stage 3D2-2 correction

on:
  push:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/workflows/cliphub-stage3d2-2-apply.yml
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-2-trigger.txt

permissions:
  contents: write

concurrency:
  group: cliphub-stage3d2-2-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == '7015725/ClipHub'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0
      - name: Apply validated correction
        shell: bash
        run: bash .github/cliphub-stage3d2-2/apply.sh
