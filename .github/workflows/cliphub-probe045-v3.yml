name: Apply ClipHub probe 045 v3

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-probe045-v3-trigger.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: cliphub-probe045-v3
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == '7015725/ClipHub'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0

      - name: Apply probe 045 v3
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          {
            set -euo pipefail
            python3 .github/cliphub-probe045-v3/apply.py

            node --check probes/cliphub_content_tags_settings_probe_045_impl.js
            node --check probes/cliphub_content_tags_settings_probe_045.js
            python3 - <<'PY'
          from pathlib import Path
          import re

          for name in [
              'probes/cliphub_content_tags_settings_probe_045_impl.js',
              'probes/cliphub_content_tags_settings_probe_045.js'
          ]:
              text = Path(name).read_text(encoding='utf-8')
              forbidden = []
              if re.search(r'(?m)^\s*(?:let|const)\s+', text):
                  forbidden.append('let/const')
              if '=>' in text:
                  forbidden.append('arrow')
              if '`' in text:
                  forbidden.append('template literal')
              if re.search(r'\bclass\s+[A-Za-z_$]', text):
                  forbidden.append('class')
              if forbidden:
                  raise SystemExit(name + ': forbidden ES6: ' + ', '.join(forbidden))
          PY
            git diff --check

            git config user.name "ClipHub Automation"
            git config user.email "actions@github.com"
            git add \
              probes/cliphub_content_tags_settings_probe_045_impl.js \
              probes/cliphub_content_tags_settings_probe_045.js \
              docs/内容标签翻译设置探测045说明.md
            git commit -m "test: correct probe 045 scene ordering and terminal checks"
            implementation_commit="$(git rev-parse HEAD)"

            python3 - "$implementation_commit" <<'PY'
          from pathlib import Path
          import sys

          commit = sys.argv[1]
          loader = Path('probes/cliphub_content_tags_settings_probe_045.js')
          text = loader.read_text(encoding='utf-8')
          old = 'var implementationCommit = "274d8ad0650b69a1972109051cfa47d2c226d2fa";'
          new = 'var implementationCommit = "' + commit + '";'
          if text.count(old) != 1:
              raise SystemExit('loader implementation commit marker mismatch')
          loader.write_text(text.replace(old, new, 1), encoding='utf-8')

          doc = Path('docs/内容标签翻译设置探测045说明.md')
          text = doc.read_text(encoding='utf-8')
          if text.count('__IMPLEMENTATION_COMMIT__') != 1:
              raise SystemExit('probe documentation commit marker mismatch')
          doc.write_text(text.replace('__IMPLEMENTATION_COMMIT__', commit, 1),
                         encoding='utf-8')
          PY

            node --check probes/cliphub_content_tags_settings_probe_045.js
            git diff --check
            git add probes/cliphub_content_tags_settings_probe_045.js \
              docs/内容标签翻译设置探测045说明.md
            git commit -m "test: publish probe 045 v3 loader"

            git rm -rf .github/cliphub-probe045-v3 \
              .github/workflows/cliphub-probe045-v3.yml \
              .github/cliphub-probe045-v3-trigger.txt
            git commit -m "chore: remove completed probe 045 v3 automation"
            git push origin HEAD:agent/initialize-project-skeleton
          } > /tmp/cliphub_probe045_v3.log 2>&1
          code=$?
          tail -n 220 /tmp/cliphub_probe045_v3.log
          if [ "$code" -ne 0 ]; then
            {
              echo 'Probe 045 v3 workflow failed:'
              echo
              echo '```text'
              tail -n 170 /tmp/cliphub_probe045_v3.log
              echo '```'
            } > /tmp/cliphub_probe045_v3_comment.md
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              --method POST --field body=@/tmp/cliphub_probe045_v3_comment.md || true
          fi
          exit "$code"
