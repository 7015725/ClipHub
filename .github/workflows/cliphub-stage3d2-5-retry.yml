name: Apply ClipHub stage 3D2-5 retry

on:
  pull_request:
    branches:
      - agent/initialize-project-skeleton
    paths:
      - .github/cliphub-stage3d2-5-retry.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/initialize-project-skeleton
          fetch-depth: 0

      - name: Patch, validate and publish
        id: stage
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/cliphub-stage3d2-5/apply.py')
          text = path.read_text(encoding='utf-8')
          start_marker = "text = replace_once(text,\n'''            ClipHub.Repository.reorderTags(ids);"
          end_marker = "\n\nnew_tag_row ="
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('reorder compatibility block not found')
          replacement = """old_reorder = '''            ClipHub.Repository.reorderTags(ids);
            uiState.tagReorderCount += 1;
            emitTagsChanged(\"tag_reordered\", tagId);
            buildPage();
            return true;
'''
new_reorder = '''            ClipHub.Repository.reorderTags(ids);
            uiState.tagReorderCount += 1;
            emitTagsChanged(\"tag_reordered\", tagId);
            rebuildTagPage();
            return true;
'''
if old_reorder in text:
    text = text.replace(old_reorder, new_reorder, 1)
elif new_reorder not in text:
    raise SystemExit('settings reorder rebuild marker missing')"""
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY

            python3 .github/cliphub-stage3d2-5/apply.py

            for file in \
              src/ch_10_editor.js \
              src/ch_11_filter.js \
              src/ch_13_settings.js; do
              node --check "$file"
            done

            python3 - <<'PY'
          from pathlib import Path
          import re

          checks = {
              'src/ch_10_editor.js': [
                  'MODULE_VERSION: 10',
                  'reference_tag_selector_v1',
                  'performTagSelectionSaveClick',
                  'ClipHub.Repository.setItemTags(id, editorDraftTagIds)'
              ],
              'src/ch_11_filter.js': [
                  'MODULE_VERSION: 14',
                  'reference_search_v7',
                  'tagColorPreviewCount'
              ],
              'src/ch_13_settings.js': [
                  'MODULE_VERSION: 6',
                  'reference_settings_v2',
                  'dragReorderEnabled: true',
                  'deleteRequiresConfirmation: true'
              ]
          }
          for name, markers in checks.items():
              text = Path(name).read_text(encoding='utf-8')
              if re.search(r'(?m)^\s*(?:let|const)\s+', text) or \
                      '=>' in text or '`' in text or \
                      re.search(r'\bclass\s+[A-Za-z_$]', text):
                  raise SystemExit(name + ': forbidden ES6 syntax')
              for marker in markers:
                  if marker not in text:
                      raise SystemExit(name + ': missing marker ' + marker)
          PY

            git diff --check
            git config user.name "ClipHub Automation"
            git config user.email "actions@github.com"
            git add \
              src/ch_10_editor.js \
              src/ch_11_filter.js \
              src/ch_13_settings.js \
              module-manifest.json \
              docs/阶段3D2-5标签管理与选择器实施说明.md
            git commit -m "feat: add transactional tag selector and visual tag manager"
            git push origin HEAD:agent/initialize-project-skeleton
          } > /tmp/stage3d25_retry.log 2>&1
          code=$?
          cat /tmp/stage3d25_retry.log
          exit "$code"

      - name: Report failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(printf 'Stage 3D2-5 retry failed:\n\n```text\n%s\n```' "$(tail -n 120 /tmp/stage3d25_retry.log)")"
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --method POST --raw-field body="$body"
